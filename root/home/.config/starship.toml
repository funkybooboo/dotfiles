add_newline = true
command_timeout = 200
format = "[$directory$git_branch$git_status]($style)$character"

[character]
error_symbol = "[✗](bold #89b4fa)"
success_symbol = "[❯](bold #89b4fa)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold #89b4fa"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic #89b4fa"

[git_status]
format     = '[$all_status]($style)'
style      = "#89b4fa"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""
