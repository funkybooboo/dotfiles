background {
    monitor =
    path = ~/Pictures/wallpapers/yellowstone.jpg
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    outer_color = rgb(cba6f7)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "03:48 PM"
    color = rgb(cdd6f4)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
