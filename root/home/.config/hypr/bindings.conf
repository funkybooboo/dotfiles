$mod = SUPER

# Applications
bind = $mod, Return, exec, uwsm app -- ghostty
bind = $mod SHIFT, F, exec, uwsm app -- thunar
bind = $mod SHIFT, N, exec, uwsm app -- nvim
bind = $mod SHIFT, G, exec, uwsm app -- signal-desktop
bind = $mod SHIFT, M, exec, uwsm app -- mpv
bind = $mod, Space, exec, hyprlauncher

# Cheatsheet
bind = $mod, C, exec, ghostty -e ~/.local/bin/hypr-keybinds

# Night mode toggle
bind = $mod CTRL, N, exec, ~/.local/bin/nightmode-toggle

# Clipboard manager
bind = $mod CTRL, V, exec, ghostty -e ~/.local/bin/clipboard-manager

# Waybar actions
bind = $mod SHIFT, A, exec, ghostty -e ~/.local/bin/calendar-tui
bind = $mod SHIFT, B, exec, ghostty -e bluetui
bind = $mod SHIFT, W, exec, ghostty -e impala
bind = $mod SHIFT, V, exec, ghostty -e wiremix
bind = $mod SHIFT, T, exec, ghostty -e btop
bind = $mod SHIFT, D, exec, ghostty -e ncdu /
bind = $mod SHIFT, P, exec, ~/.local/bin/power-mode-menu

# Window management
bind = $mod, W, killactive
bind = $mod CTRL, delete, exec, ~/.local/bin/hypr-kill-workspace
bind = $mod, F, fullscreen
bind = $mod CTRL, F, fullscreen, 1
bind = $mod ALT, F, fullscreen, 0
bind = $mod, T, togglefloating
bind = $mod, P, pseudo
bind = $mod, O, pin
bind = $mod, G, togglegroup
bind = $mod ALT, G, moveoutofgroup
bind = $mod ALT, TAB, changegroupactive, f
bind = $mod ALT SHIFT, TAB, changegroupactive, b
bind = $mod, S, togglespecialworkspace, scratchpad
bind = $mod ALT, S, movetoworkspace, special:scratchpad
bind = $mod SHIFT ALT, S, movetoworkspace, special:scratchpad silent
bind = $mod CTRL, L, exec, uwsm app -- hyprlock
bind = $mod SHIFT, Escape, exec, uwsm stop

# Toggle transparency
bind = $mod, Backspace, exec, hyprctl getoption decoration:active_opacity | grep -q '1.0' && hyprctl keyword decoration:active_opacity 0.97 && hyprctl keyword decoration:inactive_opacity 0.9 || hyprctl keyword decoration:active_opacity 1.0 && hyprctl keyword decoration:inactive_opacity 0.95

# Toggle gaps
bind = $mod SHIFT, Backspace, exec, hyprctl getoption general:gaps_in | grep -q '3' && hyprctl keyword general:gaps_in 0 && hyprctl keyword general:gaps_out 0 || hyprctl keyword general:gaps_in 3 && hyprctl keyword general:gaps_out 5

# Cursor zoom
bind = $mod CTRL, Z, exec, hyprctl keyword cursor:zoom_factor $(echo "$(hyprctl getoption cursor:zoom_factor | head -1 | awk '{print $2}') + 0.1" | bc)
bind = $mod CTRL ALT, Z, exec, hyprctl keyword cursor:zoom_factor 1.0

# Toggles (idle, night mode)
bind = $mod CTRL, I, exec, hyprctl dispatch dpms off && hyprctl dispatch dpms on; pkill -u $(whoami) hypridle || uwsm app -- hypridle

# Notifications (mako)
bind = $mod, comma, exec, makoctl dismiss
bind = $mod SHIFT, comma, exec, makoctl dismiss --all
bind = $mod CTRL, comma, exec, makoctl restore
bind = $mod ALT, comma, exec, makoctl restore && makoctl invoke

# DND toggle
bind = $mod CTRL SHIFT, comma, exec, makoctl set-mode dnd || makoctl set-mode default

# Waybar toggle
bind = $mod SHIFT, Space, exec, pkill waybar || uwsm app -- waybar

# Screenshots
bind = $mod SHIFT, S, exec, ~/.local/bin/screenshot region
bind = , Print, exec, ~/.local/bin/screenshot full
bind = $mod, Print, exec, ~/.local/bin/screenshot window

# Screen recording
bind = $mod SHIFT, R, exec, ~/.local/bin/screencast

# Focus (hjkl + arrows)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize (default)
binde = $mod ALT, H, resizeactive, -20 0
binde = $mod ALT, L, resizeactive, 20 0
binde = $mod ALT, K, resizeactive, 0 -20
binde = $mod ALT, J, resizeactive, 0 20

# Resize (fine)
binde = $mod CTRL ALT, H, resizeactive, -5 0
binde = $mod CTRL ALT, L, resizeactive, 5 0
binde = $mod CTRL ALT, K, resizeactive, 0 -5
binde = $mod CTRL ALT, J, resizeactive, 0 5

# Resize (coarse)
binde = $mod SHIFT ALT, H, resizeactive, -60 0
binde = $mod SHIFT ALT, L, resizeactive, 60 0
binde = $mod SHIFT ALT, K, resizeactive, 0 -60
binde = $mod SHIFT ALT, J, resizeactive, 0 60

# Workspace navigation
bind = $mod, TAB, workspace, e+1
bind = $mod SHIFT, TAB, workspace, e-1
bind = $mod CTRL, TAB, workspace, previous

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod SHIFT ALT, 1, movetoworkspace, 1 silent
bind = $mod SHIFT ALT, 2, movetoworkspace, 2 silent
bind = $mod SHIFT ALT, 3, movetoworkspace, 3 silent
bind = $mod SHIFT ALT, 4, movetoworkspace, 4 silent
bind = $mod SHIFT ALT, 5, movetoworkspace, 5 silent
bind = $mod SHIFT ALT, 6, movetoworkspace, 6 silent
bind = $mod SHIFT ALT, 7, movetoworkspace, 7 silent
bind = $mod SHIFT ALT, 8, movetoworkspace, 8 silent
bind = $mod SHIFT ALT, 9, movetoworkspace, 9 silent
bind = $mod SHIFT ALT, 0, movetoworkspace, 10 silent

# Move workspace to monitor
bind = $mod SHIFT ALT, left, movecurrentworkspacetomonitor, l
bind = $mod SHIFT ALT, right, movecurrentworkspacetomonitor, r
bind = $mod SHIFT ALT, up, movecurrentworkspacetomonitor, u
bind = $mod SHIFT ALT, down, movecurrentworkspacetomonitor, d

# Scroll workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = ALT, XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise 1
bind = ALT, XF86AudioLowerVolume, exec, swayosd-client --output-volume lower 1
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = $mod, XF86AudioMute, exec, swayosd-client --output-volume mute-toggle && sleep 0.3 && pactl set-default-sink $(pactl list short sinks | grep -v "Monitor" | awk '{print $1}' |head -1)

# Brightness
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind = SHIFT, XF86MonBrightnessUp, exec, swayosd-client --brightness raise 100
bind = SHIFT, XF86MonBrightnessDown, exec, swayosd-client --brightness lower 100

# Keyboard backlight
bind = , XF86KbdBrightnessUp, exec, brightnessctl -d *::kbd_backlight set +10%
bind = , XF86KbdBrightnessDown, exec, brightnessctl -d *::kbd_backlight set 10%-

# Touchpad toggle
bind = , XF86TouchpadToggle, exec, ~/.local/bin/toggle-touchpad || hyprctl keyword input:touchpad:enabled $(hyprctl getoption input:touchpad:enabled | awk '{print $2}') | grep -q true && hyprctl keyword input:touchpad:enabled false || hyprctl keyword input:touchpad:enabled true

# Lid switch (handled by hypridle)
# Laptop lid close/open is handled by hypridle - see hypridle.conf

# Laptop display toggle
bind = $mod CTRL, delete, exec, ~/.local/bin/hypr-toggle-display