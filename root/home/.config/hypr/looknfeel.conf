# Look and feel
# See https://wiki.hyprland.org/Configuring/Variables/

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 1
    col.active_border = rgba(cba6f7ff) # THEME: active_border (catppuccin mauve)
    col.inactive_border = rgba(45475aaa) # THEME: inactive_border
    layout = dwindle
    allow_tearing = false
}

dwindle {
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

group {
    groupbar {
        enabled = true
        font_size = 12
        gradients = true
    }
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.95
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(11111bee) # THEME: shadow
    }
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0, 0.35, 1
    animation = windows, 1, 3, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.5, easeInOutCubic, popin 80%
    animation = border, 1, 3, easeOutQuint
    animation = fade, 1, 3, easeInOutCubic
    animation = workspaces, 1, 3, easeOutQuint
}

cursor {
    hide_on_key_press = true
    no_warps = false
}

binds {
    hide_special_on_workspace_change = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = true
    focus_on_activate = true
    on_focus_under_fullscreen = 1
    anr_missed_pings = 3
}

ecosystem {
    no_update_news = true
}

xwayland {
    force_zero_scaling = true
}