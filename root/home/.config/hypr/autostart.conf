exec-once = systemctl --user import-environment $(env | cut -d= -f1 | tr '\n' ' ')
exec-once = dbus-update-activation-environment --systemd --all
exec-once = sleep 2 && uwsm app -- hyprpaper
exec-once = /home/nate/.config/hypr/set-wallpaper.sh
exec-once = bash -c 'socat -U - UNIX-CONNECT:/tmp/hypr/$(ls /tmp/hypr/ | sort | tail -1)/.socket2.sock | while read -r line; do case "$line" in monitoradded\*|monitorremoved\*) sleep 1; /home/nate/.config/hypr/set-wallpaper.sh ;; esac; done'
exec-once = uwsm app -- mako
exec-once = uwsm app -- swayosd-server
exec-once = uwsm app -- hyprpolkitagent
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- waybar
exec-once = uwsm app -- wl-paste --watch cliphist store