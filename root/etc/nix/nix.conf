# /etc/nix/nix.conf — deployed by migration 000003-nix.sh
# https://nixos.org/manual/nix/stable/#sec-conf-file

# Unix group containing the Nix build user accounts
build-users-group = nixbld

# Enable the new nix-command and flakes experimental features.
# nix-command: the `nix profile add/list/remove` commands (replacing the
#   old nix-env). Required for the install_nix helper in _common.sh.
# flakes: needed by some nixpkgs packages that use flake-based builds.
experimental-features = nix-command flakes
